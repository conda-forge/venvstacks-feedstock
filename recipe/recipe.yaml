schema_version: 1

context:
  name: venvstacks
  version: "0.7.0"
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/venvstacks-${{ version }}.tar.gz
  sha256: bab60ff77895b4c0437e34e46e97e1e59650b6b3f98aa8e8dbe0346ae9b34afb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - venvstacks = venvstacks.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}
    - pip >=24.1.1
    - pdm >=2.17.3
    - python-uv >=0.2.33
    - typer >=0.12.4
    - tomlkit >=0.13.2

tests:
  - python:
      imports:
        - venvstacks
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - venvstacks --help

about:
  summary: Use layered Python virtual environment stacks to share large dependencies.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/lmstudio-ai/venvstacks
  documentation: https://venvstacks.lmstudio.ai/

extra:
  recipe-maintainers:
    - thewchan
